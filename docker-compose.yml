version: '3.8'

services:

  api:
    image: ghcr.io/estelarriwi/novapass_api:latest
    container_name: novapass-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ENABLE_SCALAR=true
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - DB_CONNECTION_STRING=Host=postgres;Port=5432;Database=estelar;Username=postgres;Password=${POSTGRES_PASSWORD}
      - MONGODB_CONNECTION_STRING=mongodb://mongo:27017
      - CORS_ORIGINS=https://estelar.andrescortes.dev,https://access.estelar.andrescortes.dev,https://tickets.estelar.andrescortes.dev,https://admin.estelar.andrescortes.dev
      - QR_SECRET=${QR_SECRET}
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/estelar
      - MERCADOPAGO_ACCESS_TOKEN=${MERCADOPAGO_ACCESS_TOKEN}
    depends_on:
      - postgres
      - mongo
    networks:
      - estelar-network

  postgres:
    image: postgres:16
    container_name: novapass-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=estelar
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - estelar-network

  mongo:
    image: mongo:7
    container_name: novapass-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - estelar-network

  n8n:
    image: n8nio/n8n
    container_name: novapass-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_SECURE_COOKIE=false
      - N8N_EDITOR_BASE_URL=http://5.189.174.154:5678
      - WEBHOOK_URL=http://5.189.174.154:5678
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - estelar-network

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: novapass-npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - estelar-network

volumes:
  postgres-data:
  mongo-data:
  n8n-data:
  npm-data:
  npm-letsencrypt:

networks:
  estelar-network:
    driver: bridge
