name: CI/CD — NovaPass API

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: read

jobs:

  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile -t $IMAGE_NAME:latest .
          docker push $IMAGE_NAME:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            IMAGE_NAME="ghcr.io/estelariwi/novapass_api:latest"
            CONTAINER_NAME="novapass-api"

            echo "${{ secrets.TOKEN }}" | docker login ghcr.io -u "JuanFelipe0215" --password-stdin

            docker pull $IMAGE_NAME

            docker rm -f $CONTAINER_NAME || true

            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p 8080:8080 \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_ISSUER="${{ secrets.JWT_ISSUER }}" \
              -e JWT_AUDIENCE="${{ secrets.JWT_AUDIENCE }}" \
              -e DB_CONNECTION_STRING="${{ secrets.DB_CONNECTION_STRING }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e N8N_WEBHOOK_URL="${{ secrets.N8N_WEBHOOK_URL }}" \
              -e MONGODB_CONNECTION_STRING="${{ secrets.MONGODB_CONNECTION_STRING }}" \
              $IMAGE_NAME
